name: mon_projet_nfc
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # ── Icons ──
  cupertino_icons: ^1.0.8

  # ── NFC ──
  nfc_manager: ^4.2.1
  flutter_nfc_kit: ^3.6.2
  nfc_manager_ndef: ^1.1.0
  local_auth: ^2.1.8

  # ── Base de données ──
  sqflite: ^2.4.3
  path_provider: ^2.1.4
  path: ^1.9.1

  # ── Utilitaires ──
  uuid: ^4.5.1
  equatable: ^2.0.7
  intl: ^0.20.2
  crypto: ^3.0.6
  share_plus: ^10.1.0

  # ── State Management & DI ──
  provider: ^6.1.2
  get_it: ^9.2.0
  dartz: ^0.10.1

  # ── Police ──
  google_fonts: ^6.2.1
  
  # ── Autre ──
  flutter_launcher_icons: ^0.13.1
flutter_icons:
  image_path: "assets/images/logo.png"
  android: true
  ios: true
  remove_alpha_ios: true
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
