name: mon_projet_nfc
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Icons ──
  cupertino_icons: ^1.0.8

  # ── NFC & Connectivity ──
  nfc_manager: ^4.2.1
  flutter_nfc_kit: ^3.6.2
  nfc_manager_ndef: ^1.1.0
  ndef_record: ^1.4.2
  ndef: ^0.4.0
  local_auth: ^3.0.1
  permission_handler: ^11.4.0
  flutter_blue_plus: ^1.36.8
  nearby_connections: ^4.3.0
  share_plus: ^10.1.4

  # ── Base de données ──
  sqflite: ^2.3.0
  path_provider: ^2.1.4
  path: ^1.9.1

  # ── Utilitaires ──
  uuid: ^4.5.1
  equatable: ^2.0.7
  intl: ^0.20.2
  crypto: ^3.0.6
  pdf: ^3.10.8
  flutter_local_notifications: ^18.0.1

  # ── State Management & DI ──
  provider: ^6.1.2
  get_it: ^9.2.0
  dartz: ^0.10.1

  # ── Police ──
  google_fonts: ^6.1.0
  
  # ── Autre ──
  flutter_launcher_icons: ^0.13.1
flutter_icons:
  image_path: "assets/images/logo.png"
  android: true
  ios: true
  remove_alpha_ios: true
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.3.5
flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/splash.png

flutter_native_splash:
  color: "#121212"
  image: assets/images/splash.png
  android_12:
    image: assets/images/splash.png
    icon_background_color: "#121212"
  fullscreen: true
