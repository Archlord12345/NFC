name: Zip Project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  zip-project:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Zip project
        run: zip -r project.zip . -x "*.git*" -x "build/*" -x ".dart_tool/*"
      - name: Upload Zip
        uses: actions/upload-artifact@v4
        with:
          name: full-project-zip
          path: project.zip
          retention-days: 7
